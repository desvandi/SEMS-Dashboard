  <rect x="29" y="42" width="6" height="2" rx="1" fill="#06b6d4"/>
  <rect x="26" y="47" width="8" height="4" rx="1" fill="#06b6d4" opacity="0.7"/>
  
  <!-- "S" letter small -->
