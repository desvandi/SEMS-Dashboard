  <!-- Sun rays -->
  <circle cx="32" cy="28" r="10" fill="#10b981" opacity="0.9"/>
  
  <!-- Rays -->
  <line x1="32" y1="14" x2="32" y2="10" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="42" x2="32" y2="46" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="18" y1="28" x2="14" y2="28" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="46" y1="28" x2="50" y2="28" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="21.5" y1="17.5" x2="18.7" y2="14.7" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42.5" y1="38.5" x2="45.3" y2="41.3" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42.5" y1="17.5" x2="45.3" y2="14.7" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="21.5" y1="38.5" x2="18.7" y2="41.3" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Battery icon below sun -->
