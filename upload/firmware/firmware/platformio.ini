; ============================================================================
; SEMS PlatformIO Configuration
; Smart Energy Management System
; Also compatible with Arduino IDE (copy .ino + config.h + utils/)
; ============================================================================
; SECURITY FIX v1.0.2: OTA password now uses build flag.
;   Set via: -DOTA_PASSWORD='"your_password"' in build_flags below.
;   Default "CHANGE_ME" matches config.h placeholder.
; ============================================================================

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Serial monitor speed
monitor_speed = 115200

; Upload speed
upload_speed = 921600

; Library dependencies
lib_deps =
    adafruit/Adafruit INA219 @ ^1.2.1
    adafruit/Adafruit ADS1X15 @ ^2.4.0
    adafruit/Adafruit SHT31 Library @ ^2.2.0
    adafruit/RTClib @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0

; Build flags
; SECURITY FIX v1.0.2: Set credentials via build flags for production.
;   Example: -DWIFI_SSID='"my_wifi"' -DWIFI_PASSWORD='"my_pass"'
;            -DGAS_SCRIPT_URL='"https://script.google.com/macros/s/YOUR_ID/exec"'
;            -DGAS_API_TOKEN='"your_token"'
;            -DOTA_PASSWORD='"your_ota_password"'
build_flags =
    -DDEBUG_ENABLED=1

; Partition scheme (for OTA)
board_build.partitions = default.csv

; OTA configuration
; SECURITY FIX v1.0.2: Must match OTA_PASSWORD define in config.h.
; Set via build flag above. Default "CHANGE_ME" matches config.h.
upload_protocol = espota
upload_flags =
    --port=3232
    --auth=CHANGE_ME
